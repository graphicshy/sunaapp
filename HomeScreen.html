<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vara · HomeScreen v2</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!-- Instrument Sans: warm, humanist, editorial -->
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --vara-sans: 'Instrument Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --vara-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
  }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #f0eee9;
    font-family: var(--vara-sans);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "kern";
  }
  *, *::before, *::after { box-sizing: border-box; }

  @keyframes varaPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.025); }
  }
  @keyframes varaFadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes varaBreathe {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
  @keyframes varaDrift {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50% { transform: translate3d(0, -6px, 0); }
  }

  .vara-scroll::-webkit-scrollbar { display: none; }
  .vara-scroll { scrollbar-width: none; }

  /* Tweaks panel */
  .tweaks {
    position: fixed; right: 20px; bottom: 20px; z-index: 999;
    background: rgba(22,20,18,0.9); color: #f4f0ea;
    border: 0.5px solid rgba(255,255,255,0.14);
    border-radius: 16px; padding: 18px;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    font-family: var(--vara-sans); font-size: 12px;
    min-width: 280px; max-width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    display: none;
  }
  .tweaks.on { display: block; }
  .tweaks h4 {
    margin: 0 0 14px; font-weight: 500; font-size: 10px;
    letter-spacing: 0.32em; text-transform: uppercase; opacity: 0.7;
  }
  .tweaks .group { margin-bottom: 16px; }
  .tweaks .group:last-child { margin-bottom: 0; }
  .tweaks label {
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    opacity: 0.55; margin-bottom: 8px; display: block; font-weight: 500;
  }
  .tweaks .seg {
    display: grid; gap: 4px;
  }
  .tweaks .seg.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .tweaks .seg.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .tweaks .seg.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .tweaks .seg button {
    background: rgba(255,255,255,0.05); color: inherit;
    border: 0.5px solid rgba(255,255,255,0.1);
    padding: 9px 4px; border-radius: 8px; cursor: pointer;
    font-family: inherit; font-size: 10.5px; letter-spacing: 0.02em;
    font-weight: 400;
    transition: all 0.2s;
  }
  .tweaks .seg button:hover { background: rgba(255,255,255,0.12); }
  .tweaks .seg button.active {
    background: rgba(255,255,255,0.22);
    border-color: rgba(255,255,255,0.35);
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="lib/ios-frame.jsx"></script>
<script type="text/babel" src="lib/design-canvas.jsx"></script>
<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/HomeA.jsx"></script>
<script type="text/babel" src="components/HomeV2.jsx"></script>
</head>
<body>
<div id="root"></div>

<div class="tweaks" id="tweaks-panel">
  <h4>Tweaks</h4>
  <div class="group">
    <label>Time of day</label>
    <div class="seg cols-4" id="tweak-sky"></div>
  </div>
  <div class="group">
    <label>Baseline state</label>
    <div class="seg cols-3" id="tweak-state"></div>
  </div>
</div>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "sky": "night",
  "state": "rigid"
}/*EDITMODE-END*/;

const SKY_LABELS = {
  sunrise: 'Sunrise', morning: 'Morning', goldenNoon: 'Noon', afternoon: 'Aftern.',
  goldenHour: 'Golden', dusk: 'Dusk', night: 'Night', deepNight: 'Deep',
};
const SKY_IDS = ['sunrise','morning','goldenNoon','afternoon','goldenHour','dusk','night','deepNight'];
const STATE_IDS = ['rigid', 'reactive', 'elastic'];

function App() {
  const [skyId, setSkyId] = React.useState(() => {
    try { return localStorage.getItem('vara.sky') || TWEAK_DEFAULTS.sky; } catch { return TWEAK_DEFAULTS.sky; }
  });
  const [stateId, setStateId] = React.useState(() => {
    try { return localStorage.getItem('vara.state') || TWEAK_DEFAULTS.state; } catch { return TWEAK_DEFAULTS.state; }
  });

  React.useEffect(() => { try { localStorage.setItem('vara.sky', skyId); } catch {} }, [skyId]);
  React.useEffect(() => { try { localStorage.setItem('vara.state', stateId); } catch {} }, [stateId]);

  React.useEffect(() => {
    window.__setSky = setSkyId;
    window.__setState = setStateId;

    const skySeg = document.getElementById('tweak-sky');
    if (skySeg) {
      [...skySeg.querySelectorAll('button')].forEach(b => {
        b.classList.toggle('active', b.dataset.id === skyId);
      });
    }
    const stateSeg = document.getElementById('tweak-state');
    if (stateSeg) {
      [...stateSeg.querySelectorAll('button')].forEach(b => {
        b.classList.toggle('active', b.dataset.id === stateId);
      });
    }
  }, [skyId, stateId]);

  const sky = window.SKY[skyId] || window.SKY.sunrise;

  const onOpenPractice = (ex) => {
    console.log('open practice', ex?.id);
  };

  return (
    <DesignCanvas>
      <div style={{
        position: 'relative',
        padding: '140px 120px 220px',
      }}>
        {/* title */}
        <div style={{
          marginBottom: 40,
          fontFamily: 'var(--vara-sans)',
        }}>
          <div style={{
            fontSize: 36, fontWeight: 400, color: 'rgba(40,30,20,0.92)',
            letterSpacing: '-0.02em',
          }}>Vara · HomeScreen</div>
          <div style={{
            fontSize: 11, letterSpacing: '0.28em', textTransform: 'uppercase',
            color: 'rgba(60,50,40,0.55)', marginTop: 8, fontWeight: 500,
          }}>v2 · merged · sans · photo-forward</div>
        </div>

        <div style={{ display: 'flex', gap: 96, alignItems: 'flex-start' }}>
          <div>
            <IOSDevice width={402} height={874} dark={sky.dark}>
              <div style={{ width: '100%', height: '100%', position: 'relative' }}>
                <HomeV2 sky={sky} stateId={stateId} onOpenPractice={onOpenPractice} />
              </div>
            </IOSDevice>
          </div>

          {/* notes */}
          <div style={{
            maxWidth: 360, paddingTop: 40,
            fontFamily: 'var(--vara-sans)',
          }}>
            <div style={{
              fontSize: 18, fontWeight: 500, color: 'rgba(40,30,20,0.88)',
              letterSpacing: '-0.01em', marginBottom: 4,
            }}>What changed</div>
            <div style={{
              fontSize: 11, letterSpacing: '0.24em', textTransform: 'uppercase',
              color: 'rgba(60,50,40,0.5)', fontWeight: 500,
            }}>Notes</div>

            <ul style={{
              listStyle: 'none', padding: 0, margin: '24px 0 0',
              fontSize: 13, fontWeight: 400, color: 'rgba(40,30,20,0.75)',
              lineHeight: 1.65, letterSpacing: '-0.002em',
            }}>
              {[
                'Instrument Sans throughout — no more serif.',
                'Full-bleed photo hero: parallax on scroll, fades into a calm solid background below.',
                'Breathing orbs drift with the photo; scan button pulses with the breath.',
                'Kept everything: scan → chips → day rhythm → baseline → science → closing.',
                'Each section now has an eyebrow + statement head for editorial rhythm.',
                'Day-rhythm markers show both clock time and phase name — active glows.',
                'Quote sits in its own calm bay, no ornament.',
              ].map((t, i) => (
                <li key={i} style={{
                  paddingLeft: 18, position: 'relative', marginBottom: 12,
                }}>
                  <span style={{
                    position: 'absolute', left: 0, top: 10,
                    width: 6, height: 0.5, background: 'rgba(60,50,40,0.4)',
                  }}/>
                  {t}
                </li>
              ))}
            </ul>

            <div style={{
              marginTop: 32,
              padding: '16px 18px',
              background: 'rgba(255,255,255,0.65)',
              border: '0.5px solid rgba(60,50,40,0.12)',
              borderRadius: 12,
              fontSize: 12, color: 'rgba(60,50,40,0.7)',
              lineHeight: 1.6,
            }}>
              <div style={{
                fontSize: 9, letterSpacing: '0.28em', textTransform: 'uppercase',
                fontWeight: 600, color: 'rgba(60,50,40,0.55)', marginBottom: 8,
              }}>Try</div>
              Toggle <b>Tweaks</b> in the toolbar to cycle time of day. Sunrise, Golden, and Dusk are your picks — each swaps the hero photo, palette, and greeting.
            </div>
          </div>
        </div>
      </div>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// ── Tweaks wiring ──────────────────────────────────────────
const skySeg = document.getElementById('tweak-sky');
skySeg.innerHTML = SKY_IDS.map(id => `<button data-id="${id}">${SKY_LABELS[id]}</button>`).join('');
skySeg.addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  const id = b.dataset.id;
  if (window.__setSky) window.__setSky(id);
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { sky: id } }, '*');
});

const stateSeg = document.getElementById('tweak-state');
stateSeg.innerHTML = STATE_IDS.map(id => `<button data-id="${id}">${id}</button>`).join('');
stateSeg.addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  const id = b.dataset.id;
  if (window.__setState) window.__setState(id);
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { state: id } }, '*');
});

window.addEventListener('message', (e) => {
  const d = e.data || {};
  if (d.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('on');
  if (d.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('on');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');
</script>
</body>
</html>
